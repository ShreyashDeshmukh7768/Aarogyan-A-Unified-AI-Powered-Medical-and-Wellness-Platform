workflows:

  # ─────────────────────────────────────────────────────────────────────────────
  # Android — debug APK (no signing needed, ready to sideload / share)
  # ─────────────────────────────────────────────────────────────────────────────
  android-release:
    name: Android APK
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Analyze
        script: flutter analyze --no-fatal-infos

      - name: Build APK (release, unsigned)
        script: |
          flutter build apk \
            --release \
            --split-per-abi
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - $CM_NOTIFY_EMAIL          # set this env var in Codemagic UI
        notify:
          success: true
          failure: true


